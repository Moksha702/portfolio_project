<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me</title>
    <link  href="style.css" rel="stylesheet">
</head>
<body>
    
     <nav class="navbar" >
        <div class="logo">
            <h2 id="log">M</h2>
        </div>
        <div class="sections">
            <a href="index.html" >Home</a>
            <a href="about.html" >About</a>
            <a href="skills.html" >Skils / Projects</a>
            <a href="contact.html" id="bottom-line" >Contact</a>
        </div>
        
    </nav>



     <section class="container">
        <div class="heading-about">
            <p>Get In Touch</p>
            <h2>Have an idea? Let's work together</h2>
        </div>
        <div class="flex">
            <div class="details">
                <div class="contact-item">
                    <span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m2 6 10 7 10-7"/></svg></span>
                    <div><h4>Email</h4><p>mokshasai3@example.com</p></div>
                </div>

                <div class="contact-item">
                    <span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3.1 19.5 19.5 0 0 1-6-6 19.8 19.8 0 0 1-3.1-8.6A2 2 0 0 1 4.1 2h3a2 2 0 0 1 2 1.7c.1 1 .4 2 .7 3a2 2 0 0 1-.5 2.1L8 10.1a16 16 0 0 0 6 6l1.3-1.3a2 2 0 0 1 2.1-.5c1 .3 2 .5 3 .7a2 2 0 0 1 1.6 2z"/></svg></span>
                    <div><h4>Phone</h4><p>+91 xxxx xxx xxx</p></div>
                </div>

                <div class="contact-item">
                    <span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 21s-7-6.3-7-11a7 7 0 0 1 14 0c0 4.7-7 11-7 11z"/><circle cx="12" cy="10" r="2.5"/></svg></span>
                    <div><h4>Location</h4><p>Hyderabad, India</p></div>
                </div>


            </div>

            <div class="form">
                <form class="grid" >
                    <div class="form-grid">
                        
                        <div class="field"><label for="name">Your Name</label><input id="name" name="name" type="text" placeholder="Jane Doe" required /></div>
                        <div class="field"><label for="email">Your Email</label><input id="email" name="email" type="email" placeholder="jane@email.com" required /></div>
                        <div class="field full"><label for="subject">Subject</label><input id="subject" name="subject" type="text" placeholder="Let's build something" /></div>
                        <div class="field full"><label for="message">Your Message</label><textarea id="message" name="message" placeholder="Tell me about your project..." required></textarea></div>
                    </div>
                    <button type="submit" class="btn btn-primary">Send Message</button>
                </form>

            </div>
        </div>
    </section>






    
<footer>

</body>
</html>
